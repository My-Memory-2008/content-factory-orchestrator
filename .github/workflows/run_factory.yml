

name: Content Factory Orchestrator (One-Click)

on:
  schedule:
    - cron: '0 9,17 * * *'  # 9 AM & 5 PM UTC
  workflow_dispatch:         # Manual one-click trigger

jobs:
  automate-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install Dependencies
        run: pip install requests openai kaggle

      # 4. Process queue, generate script, prepare pipeline_data.json
      - name: Process Queue & Generate Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 << 'PYTHON_EOF'
          import os, json, requests, re
          from datetime import datetime, timezone
          from openai import OpenAI

          print("🧠 Starting One-Click Orchestrator...")

          with open('reel_queue.json', 'r') as f:
              queue_data = json.load(f)

          queue = queue_data.get('queue', [])
          processed_urls = {item['url'] for item in queue_data.get('processed', [])}
          
          print(f"📊 Queue: {len(queue)} pending, {len(processed_urls)} done")

          next_reel = None
          for i, reel in enumerate(queue):
              url = reel.get('url', '').strip()
              if 'instagram.com/reel/' not in url: continue
              if url in processed_urls:
                  print(f"⏭️ Skipped (Duplicate): {url}")
                  continue
              next_reel = reel
              print(f"🎯 SELECTED: {url}")
              break

          if not next_reel:
              print("✅ No new reels. Exiting.")
              exit(0)

          match = re.search(r'/reel/([^/?]+)', next_reel['url'])
          shortcode = match.group(1) if match else "unknown"
          username = next_reel.get('username', 'unknown')

          # Generate script
          print("🤖 Generating AI Script...")
          client = OpenAI(api_key=os.environ['GROQ_API_KEY'], base_url='https://api.groq.com/openai/v1')
          prompt = f"Write a 14-second YouTube Shorts script (MAX 35 words). Start with a BOLD HOOK in all caps. One actionable AI tip. End with 'Save this'. No fluff."
          
          response = client.chat.completions.create(
              model="llama-3.3-70b-versatile",
              messages=[
                  {"role": "system", "content": "YouTube Shorts expert. Ultra-concise, high-impact scripts."},
                  {"role": "user", "content": prompt}
              ],
              max_tokens=100,
              temperature=0.8
          )
          script = response.choices[0].message.content.strip()

          # Create pipeline_data.json
          pipeline = {
              "reel_url": next_reel['url'],
              "shortcode": shortcode,
              "username": username,
              "script_text": script,
              "youtube_title": f"AI Hack You Need #shorts",
              "youtube_description": f"Quick tip from @{username}. #ai #tech",
              "youtube_tags": ["AI", "Shorts", "Tech"]
          }

          with open('pipeline_data.json', 'w') as f:
              json.dump(pipeline, f, indent=2)

          # Mark as in_progress
          entry = {
              "url": next_reel['url'],
              "username": username,
              "status": "in_progress",
              "started_at": datetime.now(timezone.utc).isoformat()
          }
          queue_data.setdefault('processed', []).append(entry)
          
          with open('reel_queue.json', 'w') as f:
              json.dump(queue_data, f, indent=2)

          print("✅ pipeline_data.json ready")
          PYTHON_EOF

      # 5. Commit changes
      - name: Commit Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reel_queue.json pipeline_data.json
          if git diff-index --quiet HEAD --; then
            echo "ℹ️ No changes to commit."
          else
            git commit -m "Auto: Queued reel [skip ci]"
            git push
          fi

                  # 6. Push, Trigger & Stream Kaggle Logs (FIXED AUTH)
      - name: Push, Trigger & Stream Kaggle Logs
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KERNEL_SLUG: "content-factory-engine"
        run: |
          echo "🔐 Setting up Kaggle authentication..."
          
          # DEBUG: Show secret lengths (not values) to verify they're set
          echo "📏 KAGGLE_USERNAME length: ${#KAGGLE_USERNAME}"
          echo "📏 KAGGLE_KEY length: ${#KAGGLE_KEY}"
          
          # Validate secrets are not empty
          if [ -z "$KAGGLE_USERNAME" ] || [ -z "$KAGGLE_KEY" ]; then
            echo "❌ ERROR: Kaggle secrets are empty. Check GitHub Settings → Secrets."
            exit 1
          fi
          
          # Create kaggle.json with PROPER JSON escaping
          mkdir -p ~/.kaggle
          cat > ~/.kaggle/kaggle.json << EOF
          {"username":"$KAGGLE_USERNAME","key":"$KAGGLE_KEY"}
          EOF
          chmod 600 ~/.kaggle/kaggle.json
          
          # Verify the file was created correctly
          echo "📄 kaggle.json contents (sanitized):"
          cat ~/.kaggle/kaggle.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'username: {d[\"username\"]}, key: {d[\"key\"][:10]}...')"
          
          # Install/upgrade Kaggle CLI to latest version
          echo "📦 Ensuring latest Kaggle CLI..."
          pip install --upgrade -q kaggle
          
          # Test authentication BEFORE pushing
          echo "🧪 Testing Kaggle authentication..."
          if ! kaggle competitions list -s 1 --csv 2>/dev/null | head -1 > /dev/null; then
            echo "❌ Authentication test failed. Check your KAGGLE_KEY secret."
            echo "💡 Tip: Get a fresh key from https://www.kaggle.com/settings → API → Create New Token"
            exit 1
          fi
          echo "✅ Authentication test passed!"
          
          # Push code to Kaggle
          echo "🚀 Pushing code to Kaggle..."
          if ! kaggle kernels push -p . 2>&1 | tee push_output.log; then
            echo "❌ Push failed. Checking output:"
            cat push_output.log
            exit 1
          fi
          echo "✅ Push successful!"
          
          # Trigger execution via API
          echo "🔥 Triggering execution..."
          TRIGGER_RESP=$(curl -s -w "\n%{http_code}" -X POST \
            -u "$KAGGLE_USERNAME:$KAGGLE_KEY" \
            "https://www.kaggle.com/api/v1/kernels/execute" \
            -H "Content-Type: application/json" \
            -d "{\"kernel_slug\":\"$KERNEL_SLUG\"}" 2>&1)
          
          HTTP_CODE=$(echo "$TRIGGER_RESP" | tail -1)
          BODY=$(echo "$TRIGGER_RESP" | sed '$d')
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "✅ Execution triggered (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Trigger response: HTTP $HTTP_CODE"
            echo "Body: $BODY"
            echo "💡 Notebook may still run via schedule or manual trigger"
          fi
          
          # Wait for queue
          echo "⏳ Waiting for Kaggle to allocate resources (~90s)..."
          sleep 90
          
          # 🔄 POLLING & LOG STREAMING
          TIMEOUT=1800
          INTERVAL=30
          ELAPSED=0
          LAST_LOG_LINE=0
          
          echo "::group::📜 KAGGLE LIVE LOGS"
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS_OUTPUT=$(kaggle kernels status $KAGGLE_USERNAME/$KERNEL_SLUG 2>/dev/null || echo "unknown")
            STATUS=$(echo "$STATUS_OUTPUT" | grep -oi "running\|complete\|error\|queued\|unknown" | tail -1)
            
            echo "📊 [$((ELAPSED/60))m ${ELAPSED}s] Status: $STATUS"
            
            if [ "$STATUS" = "complete" ]; then
              echo "✅ Execution finished!"
              break
            elif [ "$STATUS" = "error" ]; then
              echo "❌ Execution failed. Fetching error logs..."
              kaggle kernels output $KAGGLE_USERNAME/$KERNEL_SLUG -p /tmp 2>/dev/null
              [ -f /tmp/output.txt ] && cat /tmp/output.txt
              exit 1
            fi
            
            # Stream new log lines only
            kaggle kernels output $KAGGLE_USERNAME/$KERNEL_SLUG -p /tmp 2>/dev/null
            if [ -f /tmp/output.txt ]; then
              TOTAL_LINES=$(wc -l < /tmp/output.txt)
              if [ "$TOTAL_LINES" -gt "$LAST_LOG_LINE" ]; then
                tail -n +$((LAST_LOG_LINE + 1)) /tmp/output.txt
                LAST_LOG_LINE=$TOTAL_LINES
              fi
            fi
            
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "::endgroup::"
          
          if [ "$STATUS" != "complete" ]; then
            echo "⚠️ Timeout or incomplete. Final logs:"
            kaggle kernels output $KAGGLE_USERNAME/$KERNEL_SLUG -p /tmp 2>/dev/null
            [ -f /tmp/output.txt ] && cat /tmp/output.txt
          fi
      # 7. Final log
      - name: Final Status
        run: |
          echo "========================================="
          echo "✅ ONE-CLICK AUTOMATION COMPLETE"
          echo "📁 pipeline_data.json pushed to Kaggle"
          echo "🔥 Kaggle execution triggered"
          echo "⏳ Check Kaggle notebook for progress:"
          echo "   https://www.kaggle.com/$KAGGLE_USERNAME/content-factory-engine"
          echo "========================================="




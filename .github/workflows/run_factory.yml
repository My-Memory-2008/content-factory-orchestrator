name: Content Factory Orchestrator (Duplicate-Proof)

on:
  workflow_dispatch:         # Allows manual trigger

jobs:
  process-queue:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Allows the bot to push files back to repo
      actions: write         # Required to read/write rolling artifact tracking pools

    steps:
      # 1. Checkout your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install lightweight dependencies
      - name: Install Dependencies
        run: |
         pip install requests openai yt-dlp requests[socks]
         python -m pip install --upgrade pip
         pip install playwright
         playwright install chromium --with-deps
         
      # 4. Process queue → generate pipeline_data.json
      - name: Process Queue & Generate Script
        run: |
          python3 << 'EOF'
          import os, json, re
          from datetime import datetime, timezone
          
          with open('reel_queue.json', 'r') as f:
              data = json.load(f)
          
          queue = data.get('queue', [])
          processed = {p['url'] for p in data.get('processed', [])}
          
          pick = None
          for r in queue:
              if '://instagram.com' in r['url']:
                  pick = r
                  break
          
          if not pick:
              print("✅ No new reels. Exiting.")
              exit(0)
          
          sc_match = re.search(r'/reel/([^/?]+)', pick['url'])
          sc = sc_match.group(1) if sc_match else "unknown"
          user = pick.get('username', 'unknown')
          
          with open('pipeline_data.json', 'w') as f:
            json.dump({
                 "reel_url": pick['url'], "shortcode": sc, "username": user,
                 "script_text": " ",
                  "youtube_title": f"AI Hack #shorts",
                  "youtube_description": f"Tip from @{user}. #ai",
                  "youtube_tags": ["AI","Shorts"]
              }, f, indent=2)
          
          data.setdefault('processed', []).append({
              "url": pick['url'], "username": user,
              "status": "in_progress", "started_at": datetime.now(timezone.utc).isoformat()
          })
          with open('reel_queue.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(f"✅ Queued: {pick['url']}")
          EOF

      # ====================================================================
      # FIXED ROUTINE: GHCR IMAGE PATH & SOCKS5 TUNNEL ALIGNMENT
      # ====================================================================

      # 4a. Initialize a clean residential consumer tunnel via Cloudflare WARP using correct image tag
      - name: Initialize Cloudflare WARP Cloud Network
        run: |
          # Pull and run directly from GitHub Container Registry (ghcr.io)
          docker run -d --name warproxy -p 1080:1080 ghcr.io/kingcc/warproxy:latest
          # Provide the cloud server a 15-second gap to finish wireguard handshakes
          sleep 15

      # 4b. Safely process video via SnapInsta.to backend token handler using local WARP routing
      - name: Cloud Download Video Asset via Proxy API
        run: |
          python3 << 'EOF'
          import json, os, subprocess, requests, re
          
          # 1. Establish and verify connection through local SOCKS5 tunnel
          proxies = {'http': 'socks5://127.0.0.1:1080', 'https': 'socks5://127.0.0.1:1080'}
          try:
              cloud_ip = requests.get('https://ipify.org', proxies=proxies, timeout=15).text.strip()
              print(f"🔒 Executing via Secure Cloudflare WARP Network IP: {cloud_ip}")
          except Exception as e:
              print(f"⚠️ Proxy connection delayed ({e}). Initializing fallback strategy...")
              proxies = None
          
          # 2. Extract pipeline target from step 4
          if not os.path.exists('pipeline_data.json'):
              print("ℹ️ pipeline_data.json missing. Skipping download loop.")
              exit(0)
              
          with open('pipeline_data.json', 'r') as f:
              pipeline = json.load(f)
          
          reel_url = pipeline.get('reel_url')
          shortcode = pipeline.get('shortcode', 'downloaded_reel')
          
          if not reel_url or "unknown" in reel_url:
              print("❌ Missing video URL target path.")
              exit(0)
              
          os.makedirs('downloads', exist_ok=True)
          output_path = f"downloads/{shortcode}.mp4"
          
          print(f"🚀 Dispatching backend extraction queries directly to SnapInsta.to...")
          
          # 3. Emulate SnapInsta.to's native AJAX token request pipeline
          ajax_endpoint = "https://snapinsta.to"
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "X-Requested-With": "XMLHttpRequest",
              "Content-Type": "application/x-www-form-urlencoded"
          }
          payload = {
              "q": reel_url,
              "t": "media",
              "lang": "en"
          }
          
          video_stream_url = None
          try:
              response = requests.post(ajax_endpoint, data=payload, headers=headers, proxies=proxies, timeout=20)
              if response.status_code == 200:
                  res_data = response.json()
                  # Parse HTML stream properties embedded in SnapInsta's json response layout
                  html_content = res_data.get('data', '')
                  
                  # Isolate the exact source video download anchor href using regular expressions
                  url_matches = re.findall(r'href="([^"]+)"[^>]*class="[^"]*download-media', html_content)
                  if url_matches:
                      video_stream_url = url_matches[0]
                      # Standardize formatting entities
                      video_stream_url = video_stream_url.replace('&amp;', '&')
          except Exception as api_err:
              print(f"❌ SnapInsta server handshake failed: {api_err}")
              
          # 4. Stream real binary data down to workspace using cURL over SOCKS5 proxy
          if video_stream_url:
              print("🔗 Source link isolated. Streaming media file blocks directly into repo...")
              curl_cmd = ["curl", "-L", "-A", "Mozilla/5.0", "-o", output_path]
              if proxies:
                  curl_cmd.extend(["--socks5-hostname", "127.0.0.1:1080"])
              curl_cmd.append(video_stream_url)
              
              subprocess.run(curl_cmd, capture_output=True)
              
              # 5. Strict Size Guard Verification Check
              if os.path.exists(output_path):
                  file_size = os.path.getsize(output_path)
                  if file_size > 50000: # Ensure size exceeds light error text fragments
                      print(f"🎉 Real video asset captured successfully! Size: {file_size / (1024*1024):.2f} MB")
                  else:
                      # If a page error is written instead of video, strip the broken file immediately
                      os.remove(output_path)
                      print("❌ Saved file contains too small of a payload footprint. Stream rejected.")
              else:
                  print("❌ File write operation dropped mid-stream by cloud disk management.")
          else:
              print("❌ Unable to extract raw link strings from target mirror payload block.")
          EOF



      # ====================================================================

      # 5. Commit changes back to GitHub
      - name: Commit Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reel_queue.json pipeline_data.json downloads/
          if git diff-index --quiet HEAD --; then
            echo "ℹ️ No changes to commit."
          else
            git commit -m "Auto: Picked next reel & downloaded media asset [skip ci]"
            git push
          fi

      # ====================================================================
      # CROSS-RUN HISTORICAL ARTIFACT RECOVERY LOOP (PERMANENT FIX)
      # ====================================================================

      # 6. Search across ALL historical runs to find and download yesterday's active token state
      - name: Download Latest Historical Kaggle Session State
        uses: dawidd6/action-download-artifact@v9
        continue-on-error: true # Safe fallback if the entire repo is wiped
        with:
          name: kaggle-rolling-state
          search_artifacts: true  # CRITICAL: Forces GitHub to look outside the current run thread
          path: .                 # Extract file directly to your main working workspace root


      # 7. Trigger Kaggle (Using Kaggle CLI & Playwright)
      - name: Trigger Kaggle Notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_AUTH_JSON: ${{ secrets.KAGGLE_AUTH_JSON }}
        run: python3 trigger.py

      # 8. Upload the freshly generated rolling session state so tomorrow's run can use it
      - name: Save Refreshed Kaggle Session State
        if: always() # Guarantees updated cookies register even if other pipeline steps fail
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-rolling-state
          path: state.json # Keep this as state.json since you verified that's what's inside
          retention-days: 7


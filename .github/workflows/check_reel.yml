name: Bulk Reel Processor Queue

on:
  workflow_dispatch: # Allows your external system or API to execute it exactly when needed

jobs:
  process-next-video:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache Hugging Face Transformers
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-gemma-cache

    - name: Install Runtime Requirements
      run: |
        pip install curl_cffi numpy opencv-python-headless Pillow playwright
        pip install torch torchvision --extra-index-url https://pytorch.org
        pip install transformers accelerate bitsandbytes
        playwright install chromium

    - name: Initialize Virtual Display Framebuffer (Xvfb)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        Xvfb :99 -screen 0 1280x720x24 &
        echo "DISPLAY=:99" >> $GITHUB_ENV
        sleep 3

    - name: Execute Unified Pipeline Script
      env:
        DISPLAY: :99
      run: python pipeline.py

    - name: Commit and Save Ledger State Modifications
      run: |
        git config --global user.name "Queue Processor Bot"
        git config --global user.email "actions@github.com"
        git pull origin main
        git add input_reels.txt rejected.txt reel_source.txt curated_vault/
        git commit -m "Auto-Update: Processed queue ledger item" || echo "No changes to save."
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

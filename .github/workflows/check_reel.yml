name: Bulk Reel Processor Queue

on:
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  process-next-video:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache Hugging Face Transformers
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-gemma-cache

    - name: Install Runtime Requirements
      run: |
        pip install curl_cffi numpy opencv-python-headless Pillow playwright
        pip install torch torchvision --extra-index-url https://pytorch.org
        pip install transformers accelerate bitsandbytes
        playwright install chromium

    - name: Initialize Virtual Display Framebuffer (Xvfb)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        Xvfb :99 -screen 0 1280x720x24 &
        echo "DISPLAY=:99" >> $GITHUB_ENV
        sleep 3

    # --- SINGLE STEP EXECUTION: MANAGEMENT AND STEALTH DOWNLOADING ---
    - name: Cloud Extraction via Playwright Screen Automation
      env:
        DISPLAY: :99
      run: |
        python3 << 'EOF'
        import sys, os, subprocess, asyncio, shutil
        from playwright.async_api import async_playwright
        
        async def process_queue_and_download():
            input_file = "input_reels.txt"
            storage_dir = "curated_vault"
            rejected_file = "rejected.txt"
            
            if not os.path.exists(input_file):
                print("ℹ️ input_reels.txt is missing. Create it to begin loops.")
                sys.exit(0)
                
            with open(input_file, "r") as f:
                urls = [line.strip() for line in f if line.strip()]
                
            if not urls:
                print("📭 Queue Empty. No entries inside input_reels.txt.")
                sys.exit(0)
                
            # Pop the first target link
            reel_url = urls[0]
            print(f"🎬 Target Isolated: {reel_url}")
            
            # Clean immediately from queue file so lists never get mixed up
            with open(input_file, "w") as f:
                for remaining_url in urls[1:]:
                    f.write(f"{remaining_url}\n")
            print("🧹 Target permanently wiped from input_reels.txt queue canvas.")
            
            try:
                shortcode = reel_url.split("/reel/")[-1].split("/")[0]
            except Exception:
                shortcode = "unique_asset"
                
            if os.path.exists(storage_dir):
                shutil.rmtree(storage_dir)
            os.makedirs(storage_dir, exist_ok=True)
            output_path = f"{storage_dir}/reel_{shortcode}.mp4"
            
            async with async_playwright() as p:
                browser = await p.chromium.launch(headless=False, args=["--disable-blink-features=AutomationControlled", "--no-sandbox"])
                context = await browser.new_context(viewport={'width': 1280, 'height': 720}, user_agent="Mozilla/5.0")
                page = await context.new_page()
                
                await page.route("**/*", lambda r: r.continue_() if not any(x in r.request.url for x in ["doubleclick", "popads", "adservice"]) else r.abort())
                await page.goto("https://snapinsta.to", wait_until="domcontentloaded", timeout=60000)
                await page.wait_for_timeout(3000)
                
                input_selector = "input#s_input"
                await page.wait_for_selector(input_selector, timeout=15000)
                await page.fill(input_selector, reel_url)
                
                await page.click("button:has-text('Download')")
                print("⏳ Loading media download links container...")
                
                try:
                    await page.wait_for_timeout(4000)
                    close_selectors = [".modal-footer button", ".close", "button:has-text('Close')"]
                    for sel in close_selectors:
                        if await page.locator(sel).is_visible(): await page.click(sel)
                except Exception:
                    pass
                    
                download_btn_selector = "a:has-text('Download Video'), a[href*='cdninstagram.com'], a.btn-download"
                video_stream_url = None
                
                try:
                    await page.wait_for_selector(download_btn_selector, timeout=25000)
                    video_stream_url = await page.locator(download_btn_selector).first.get_attribute("href")
                except Exception:
                    links = await page.locator("a").all()
                    for link in links:
                        href = await link.get_attribute("href")
                        if href and ("instagram" in href or "cdn" in href or ".mp4" in href):
                            video_stream_url = href
                            break
                            
                await browser.close()
                
            if video_stream_url:
                video_stream_url = video_stream_url.replace('&amp;', '&')
                subprocess.run(["curl", "-L", "-A", "Mozilla/5.0", "-o", output_path, video_stream_url], capture_output=True)
                if os.path.exists(output_path) and os.path.getsize(output_path) > 50000:
                    print("🎉 Media payload streamed successfully into file blocks.")
                    return
                    
            print("❌ Download Pipeline failed to isolate stream container tags.")
            with open(rejected_file, "a") as f_rej:
                f_rej.write(f"{reel_url} - Downloader engine failed to grab asset file\n")
                
        asyncio.run(process_queue_and_download())
        EOF

    # --- STEP 2: RUN QUANTIZED GEMMA VISUAL ANALYSIS ONLY IF FILE IS PRESENT ---
    - name: Execute Gemma AI Verification Pipeline
      run: python pipeline.py

    # --- STEP 3: COMMIT REPOSITORY CHANGES ---
    - name: Commit and Save Ledger State Modifications
      run: |
        git config --global user.name "Queue Processor Bot"
        git config --global user.email "actions@github.com"
        git pull origin main
        git add input_reels.txt rejected.txt reel_source_summa.txt
        git commit -m "Auto-Update: Processed queue ledger item" || echo "No changes to save."
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

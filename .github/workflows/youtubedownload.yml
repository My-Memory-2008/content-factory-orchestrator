name: YouTube Video Downloader Automation (via Publer + uBlock)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Paste the YouTube URL to pass to Publer'
        required: true
        type: string

jobs:
  download_video:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Codebase Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright and Dependencies
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Download and Unpack uBlock Origin Lite
        run: |
          mkdir -p ./ublock-ext
          curl -L -o ublock.zip "https://google.com"
          unzip -o ublock.zip -d ./ublock-ext || true
          echo "📦 Extension downloaded and unpacked into workspace directory structures."

      - name: Execute Web Automation Interface
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        uses: actions/github-script@v7
        with:
          script: |
            const { chromium } = require('playwright');
            const fs = require('fs');
            const path = require('path');

            const videoUrl = process.env.VIDEO_URL;
            console.log(`🚀 Launching Chrome Engine with uBlock Origin Lite for Publer: ${videoUrl}`);

            const downloadFolder = './downloads';
            if (!fs.existsSync(downloadFolder)){
                fs.mkdirSync(downloadFolder);
            }

            const extensionPath = path.resolve('./ublock-ext');

            const browserContext = await chromium.launchPersistentContext('', {
              headless: false, 
              args: [
                `--headless=new`, 
                `--disable-extensions-except=${extensionPath}`,
                `--load-extension=${extensionPath}`,
                `--no-sandbox`,
                `--disable-setuid-sandbox`
              ],
              acceptDownloads: true,
              viewport: { width: 1440, height: 900 }
            });

            const pages = browserContext.pages();
            const page = pages.length > 0 ? pages[0] : await browserContext.newPage();

            try {
              // Navigate directly to Publer's tool landing page
              await page.goto('https://publer.com', { waitUntil: 'networkidle' });
              
              // 🛠️ ACCURATE TARGET INPUT SELECTOR FILTER:
              // Excludes checkbox elements and targets text-type input forms nested inside the interactive zone
              const inputSelector = 'input[type="text"]:not([type="checkbox"]), input[type="url"], div.flex > input';
              await page.waitForSelector(inputSelector, { state: 'visible', timeout: 30000 });
              
              const inputField = page.locator(inputSelector).first();
              await inputField.click();
              await inputField.fill('');
              await inputField.fill(videoUrl);
              console.log("✅ Link successfully entered into Publer target form element.");

              // Click the primary operational download execution button next to it
              const submitButton = page.locator('button:has-text("Download"), button[type="submit"]').first();
              await submitButton.click();
              console.log("⏳ Processing conversion request on remote server...");

              // STEP 3: HIGH-ACCURACY DYNAMIC ASSET INTERCEPTOR
              const targetedHrefSelector = 'a[href*="publer-media-downloader"], a:has-text("Save"), a:has-text("device")';
              
              console.log("⏳ Waiting for Publer backend to compile video files and render the Save button...");
              await page.waitForSelector(targetedHrefSelector, { state: 'attached', timeout: 60000 });
              console.log("🎯 Conversion complete! Target link element identified.");

              // Close background browser popups triggered on user mouse click sequences
              browserContext.on('page', async popup => {
                await popup.close().catch(() => {});
              });

              // STEP 4: TRAP AND EXECUTE DOWNLOAD PIPELINE
              const downloadPromise = page.waitForEvent('download');
              
              console.log("📥 Clicking anchor link to trigger direct asset capture...");
              await page.locator(targetedHrefSelector).first().click();
              
              const download = await downloadPromise;

              // Save the file binary payload securely to pipeline container storage space
              const finalPath = path.join(downloadFolder, download.suggestedFilename() || 'video.mp4');
              await download.saveAs(finalPath);
              console.log(`✅ File successfully transferred down to workflow runner context path at: ${finalPath}`);

            } catch (error) {
              console.error("❌ Automation routing routine caught failure exception:", error);
              
              try {
                await page.screenshot({ path: 'downloads/error-layout-screenshot.png', fullPage: true });
                console.log("📸 Saved failure visual screenshot layout state to artifact logs.");
              } catch (screenshotError) {
                console.error("⚠️ Failed to capture error state screenshot:", screenshotError);
              }
              
              core.setFailed(error.message);
            } finally {
              await browserContext.close();
            }

      - name: Export Extracted Media File as Pipeline Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: publer-downloaded-video
          path: ./downloads/
          retention-days: 5


name: YouTube Video Downloader Automation (via Y2mate Tabs)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Paste the YouTube URL to pass to Y2mate'
        required: true
        type: string

jobs:
  download_video:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Codebase Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright and System Dependencies
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Execute Web Automation Interface
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        uses: actions/github-script@v7
        with:
          script: |
            const { chromium } = require('playwright');
            const fs = require('fs');
            const path = require('path');

            const videoUrl = process.env.VIDEO_URL;
            console.log(`🚀 Processing automation targeting Y2mate engine for: ${videoUrl}`);

            const browser = await chromium.launch({ headless: true });
            
            const browserContext = await browser.newContext({
              acceptDownloads: true,
              viewport: { width: 1280, height: 800 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await browserContext.newPage();

            const downloadFolder = './downloads';
            if (!fs.existsSync(downloadFolder)){
                fs.mkdirSync(downloadFolder);
            }

            try {
              // Navigate to the target Y2mate engine
              await page.goto('https://www-y2mate.com', { waitUntil: 'networkidle' });
              
              // Enter the target YouTube link into the search box container
              const inputSelector = 'input[placeholder*="Search or paste link here"], input#txt-url';
              await page.waitForSelector(inputSelector);
              await page.fill(inputSelector, videoUrl);
              console.log("✏️ Link successfully entered into Y2mate input field.");

              // Click the initial processing 'Start' button
              const startButtonSelector = 'button:has-text("Start"), input[value="Start"], #btn-submit';
              await page.click(startButtonSelector);
              console.log("⏳ Processing conversion request on remote server...");

              // 🛠️ STEP 1: SELECT THE "VIDEO" TAB
              // Locate the tab selector based on your screenshot and switch away from 'Audio'
              const videoTabSelector = 'a:has-text("Video"), li:has-text("Video"), button:has-text("Video")';
              await page.waitForSelector(videoTabSelector, { timeout: 30000 });
              await page.click(videoTabSelector);
              console.log("🗂️ Successfully clicked and switched onto the Video files tab.");

              // 🛠️ STEP 2: ISOLATE THE HIGHEST RESOLUTION DOWNLOAD BUTTON
              // Select download buttons nested under the active video rows grid
              const conversionDownloadSelector = 'button:has-text("Download"), a.btn-success';
              await page.waitForSelector(conversionDownloadSelector, { timeout: 30000 });
              console.log("🎯 Quality links rendered! Target first download option.");

              // 🛠️ STEP 3: ANTI-REDIRECT PROMISE PIPELINE
              // Because y2mate button clicks launch ad-popups, we explicitly track 
              // the download event while letting the main page context close any secondary rogue tabs
              const downloadPromise = page.waitForEvent('download');
              
              // Listen for any new pop-up tabs generated by ad networks and immediately close them
              browserContext.on('page', async popup => {
                await popup.waitForLoadState().catch(() => {});
                console.log(`🛡️ Blocked an advertising pop-up link: ${popup.url()}`);
                await popup.close().catch(() => {});
              });

              // Click the first download action button in the video array block
              await page.locator(conversionDownloadSelector).first().click();
              
              // Check if y2mate triggers an inline modal processing confirmation overlay
              const modalDownloadButton = page.locator('div.modal-dialog button:has-text("Download"), #process-result a, .modal-content a');
              await page.waitForTimeout(3000); // Give the modal a brief moment to render if processing
              
              if (await modalDownloadButton.count() > 0 && await modalDownloadButton.first().isVisible()) {
                 console.log("👆 Confirming download request inside internal dynamic modal block...");
                 await modalDownloadButton.first().click();
              }

              // Resolve and download file binary block stream data securely
              const download = await downloadPromise;

              // Save finalized media payload configuration to runner environment folder paths
              const finalPath = path.join(downloadFolder, download.suggestedFilename() || 'video.mp4');
              await download.saveAs(finalPath);
              console.log(`✅ File successfully transferred down to workflow runner context path at: ${finalPath}`);

            } catch (error) {
              console.error("❌ Automation routing routine caught failure exception:", error);
              
              try {
                await page.screenshot({ path: 'downloads/error-layout-screenshot.png', fullPage: true });
                console.log("📸 Saved failure visual screenshot layout state to artifact logs.");
              } catch (screenshotError) {
                console.error("⚠️ Failed to capture error state screenshot:", screenshotError);
              }
              
              core.setFailed(error.message);
            } finally {
              await browser.close();
            }

      - name: Export Extracted Media File as Pipeline Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: y2mate-downloaded-video
          path: ./downloads/
          retention-days: 5

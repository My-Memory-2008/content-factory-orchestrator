name: YouTube Video Downloader Automation (Python Async + uBlock)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Paste the YouTube URL to download'
        required: true
        type: string

jobs:
  download_video:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Codebase Checkout
        uses: actions/checkout@v4

      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies & Playwright Core
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Download and Unpack uBlock Origin Lite Engine
        run: |
          mkdir -p ./ublock-ext
          curl -L -o ublock.zip "https://google.com"
          unzip -o ublock.zip -d ./ublock-ext || true
          echo "📦 Extension successfully loaded and extracted into directory structure."

      - name: Execute Async Python Web Automation Script
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        shell: python
        run: |
          import os
          import sys
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              video_url = os.environ.get("VIDEO_URL")
              print(f"🚀 Launching Async Python Chrome Engine with uBlock Lite for SaveFrom: {video_url}")

              download_folder = os.path.abspath("./downloads")
              os.makedirs(download_folder, exist_ok=True)
              extension_path = os.path.abspath("./ublock-ext")

              async with async_playwright() as p:
                  # Initialize a persistent user space to cleanly deploy unpacked crx extensions
                  browser_context = await p.chromium.launch_persistent_context(
                      user_data_dir="",
                      headless=False,
                      args=[
                          "--headless=new", # Runs invisible while allowing extension scripts to block network tracking
                          f"--disable-extensions-except={extension_path}",
                          f"--load-extension={extension_path}",
                          "--no-sandbox",
                          "--disable-setuid-sandbox"
                      ],
                      accept_downloads=True,
                      viewport={"width": 1280, "height": 800}
                  )

                  # Capture the default profile window tab context
                  pages = browser_context.pages
                  page = pages[0] if pages else await browser_context.new_page()

                  try:
                      # 🛠️ ASYNC DOMCONTENTLOADED NAVIGATION:
                      # Breaks page tracking hooks immediately once core structural inputs form on screen
                      await page.goto("https://savefrom.net", wait_until="domcontentloaded", timeout=60000)
                      await page.wait_for_timeout(4000)

                      print("📍 Arrived at SaveFrom interface layout framework.")

                      # 🛠️ TARGET EXACT ID INPUT MATCH FROM YOUR SNIPPET:
                      # Locks onto id="sf_url" directly, ignoring hidden mobile elements completely
                      input_selector = "input#sf_url"
                      
                      await page.wait_for_selector(input_selector, timeout=15000)
                      await page.fill(input_selector, video_url)
                      await page.wait_for_timeout(1000)
                      print("✅ Link successfully targeted by structural ID and text filled.")

                      # 🛠️ TARGET EXACT ID BUTTON MATCH FROM YOUR SNIPPET:
                      # Clicks id="sf_submit" directly to trigger server translation routines
                      submit_selector = "button#sf_submit"
                      await page.click(submit_selector)
                      print("⏳ Processing conversion request on remote server...")

                      # Wait for SaveFrom to generate the video quality output container cards
                      download_button_selector = '.download-icon, a.link-download, .link-group a, a[href*="storage"], button:has-text("Download")'
                      print("⏳ Waiting for the specific download grid options to render on screen...")
                      await page.wait_for_selector(download_button_selector, state="attached", timeout=45000)
                      print("🎯 Quality download choices localized successfully!")

                      # Suppress unexpected advertising tab windows generated on click threads
                      async def handle_popup(popup_page):
                          try:
                              await popup_page.close()
                              print("🛡️ Blocked an advertising redirect pop-under context.")
                          except:
                              pass
                      browser_context.on("page", handle_popup)

                      # 🛠️ CAPTURE AND DOWNLOAD FILE STREAM IN ASYNC PYTHON:
                      print("📥 Clicking primary video download link layout asset node...")
                      async with page.expect_download(timeout=60000) as download_info:
                          await page.locator(download_button_selector).first.click()
                      
                      download = await download_info.value
                      final_path = os.path.join(download_folder, download.suggested_filename or "video.mp4")
                      
                      # Save asset stream down to physical disk mapping routes
                      await download.save_as(final_path)
                      print(f"✅ File successfully transferred down to path at: {final_path}")

                  except Exception as error:
                      print(f"❌ Automation routing routine caught failure exception: {error}", file=sys.stderr)
                      try:
                          await page.screenshot(path="./downloads/error-layout-screenshot.png", full_page=True)
                          print("📸 Saved failure visual screenshot layout state to artifact logs.")
                      except Exception as e:
                          print(f"⚠️ Failed to capture error screenshot: {e}")
                      sys.exit(1)
                  finally:
                      await browser_context.close()

          # Boot up the Python Asyncio event loop manager to parse the code block
          asyncio.run(main())

      - name: Export Extracted Media File as Pipeline Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: savefrom-python-async-video
          path: ./downloads/
          retention-days: 5

          extension_path = os.path.abspath("./ublock-ext")

          with sync_playwright() as p:
              # Initialize a persistent user space to cleanly deploy unpacked crx extensions
              browser_context = p.chromium.launch_persistent_context(
                  user_data_dir="",
                  headless=False,
                  args=[
                      "--headless=new", # Runs invisible while allowing extension scripts to block network tracking
                      f"--disable-extensions-except={extension_path}",
                      f"--load-extension={extension_path}",
                      "--no-sandbox",
                      "--disable-setuid-sandbox"
                  ],
                  accept_downloads=True,
                  viewport={"width": 1280, "height": 800}
              )

              # Capture the default default profile window tab context
              page = browser_context.pages[0] if browser_context.pages else browser_context.new_page()

              try:
                  # 🛠️ DOMCONTENTLOADED LIFECYCLE FORWARD:
                  # Breaks page tracking hooks immediately once core structural inputs form on screen
                  page.goto("https://en.savefrom.net/", wait_until="domcontentloaded")
                  print("📍 Arrived at SaveFrom interface layout framework.")

                  # 🛠️ TARGET EXACT ID INPUT MATCH FROM YOUR SNIPPET:
                  # Locks onto id="sf_url" directly, ignoring hidden mobile elements completely
                  input_selector = "input#sf_url"
                  page.wait_for_selector(input_selector, state="visible", timeout=30000)
                  
                  input_field = page.locator(input_selector).first
                  input_field.click()
                  input_field.fill("")
                  input_field.fill(video_url)
                  print("✅ Link successfully targeted by structural ID and text filled.")

                  # 🛠️ TARGET EXACT ID BUTTON MATCH FROM YOUR SNIPPET:
                  # Clicks id="sf_submit" directly to trigger server translation routines
                  submit_selector = "button#sf_submit"
                  page.click(submit_selector)
                  print("⏳ Processing conversion request on remote server...")

                  # Wait for SaveFrom to generate the video quality output container cards
                  download_button_selector = '.download-icon, a.link-download, .link-group a, a[href*="storage"], button:has-text("Download")'
                  print("⏳ Waiting for the specific download grid options to render on screen...")
                  page.wait_for_selector(download_button_selector, state="attached", timeout=45000)
                  print("🎯 Quality download choices localized successfully!")

                  # Suppress unexpected advertising tab windows generated on click threads
                  def handle_popup(popup_page):
                      try:
                          popup_page.close()
                          print("🛡️ Blocked an advertising redirect pop-under context.")
                      except:
                          pass
                  browser_context.on("page", handle_popup)

                  # 🛠️ CAPTURE AND DOWNLOAD FILE STREAM IN PYTHON:
                  print("📥 Clicking primary video download link layout asset node...")
                  with page.expect_download(timeout=60000) as download_info:
                      page.locator(download_button_selector).first.click()
                  
                  download = download_info.value
                  final_path = os.path.join(download_folder, download.suggested_filename or "video.mp4")
                  
                  # Save asset stream down to physical disk mapping routes
                  download.save_as(final_path)
                  print(f"✅ File successfully transferred down to path at: {final_path}")

              except Exception as error:
                  print(f"❌ Automation routing routine caught failure exception: {error}", file=sys.stderr)
                  try:
                      page.screenshot(path="./downloads/error-layout-screenshot.png", full_page=True)
                      print("📸 Saved failure visual screenshot layout state to artifact logs.")
                  except Exception as e:
                      print(f"⚠️ Failed to capture error screenshot: {e}")
                  sys.exit(1)
              finally:
                  browser_context.close()

      - name: Export Extracted Media File as Pipeline Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: savefrom-python-video
          path: ./downloads/
          retention-days: 5


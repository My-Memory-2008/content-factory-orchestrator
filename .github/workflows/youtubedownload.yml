name: YouTube Video Downloader Automation (via Publer)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Paste the YouTube URL to pass to Publer'
        required: true
        type: string

jobs:
  download_video:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Codebase Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright and System Dependencies
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Execute Web Automation Interface
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        uses: actions/github-script@v7
        with:
          script: |
            const { chromium } = require('playwright');
            const fs = require('fs');
            const path = require('path');

            const videoUrl = process.env.VIDEO_URL;
            console.log(`🚀 Processing automation targeting Publer engine for: ${videoUrl}`);

            const browser = await chromium.launch({ headless: true });
            
            // Renamed 'context' to 'browserContext' to resolve the variable conflict
            const browserContext = await browser.newContext({
              acceptDownloads: true,
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await browserContext.newPage();

            try {
              // Navigate directly to Publer's free tool asset page
              await page.goto('https://publer.com', { waitUntil: 'networkidle' });
              
              // Locate the text input field and type the YouTube link
              const inputSelector = 'input[placeholder*="Paste the URL"], input[type="text"]';
              await page.waitForSelector(inputSelector);
              await page.fill(inputSelector, videoUrl);
              console.log("✏️ Link successfully entered into Publer framework container.");

              // Locate and click the 'Download' action execution button
              const buttonSelector = 'button:has-text("Download")';
              await page.click(buttonSelector);
              console.log("⏳ Processing conversion request on remote server...");

              // Wait for Publer to process video and generate the media resource item link
              const downloadLinkSelector = 'a[download], button:has-text("Download Video"), .download-link a';
              await page.waitForSelector(downloadLinkSelector, { timeout: 60000 });

              // Initialize a Playwright event promise block to capture incoming browser file download stream
              const downloadPromise = page.waitForEvent('download');
              await page.click(downloadLinkSelector);
              const download = await downloadPromise;

              // Ensure safe directory allocation path exists locally
              const downloadFolder = './downloads';
              if (!fs.existsSync(downloadFolder)){
                  fs.mkdirSync(downloadFolder);
              }

              // Save file storage mapping output payload
              const finalPath = path.join(downloadFolder, download.suggestedFilename() || 'video.mp4');
              await download.saveAs(finalPath);
              console.log(`✅ File successfully transferred down to workflow runner context path at: ${finalPath}`);

            } catch (error) {
              console.error("❌ Automation routing routine caught failure exception:", error);
              core.setFailed(error.message);
            } finally {
              await browser.close();
            }

      - name: Export Extracted Media File as Pipeline Artifact
        uses: actions/upload-artifact@v4
        with:
          name: publer-downloaded-video
          path: ./youtubedownloads/
          retention-days: 5

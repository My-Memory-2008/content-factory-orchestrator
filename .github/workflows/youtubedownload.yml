name: YouTube Video Downloader Automation (via Brave Browser Engine)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Paste the YouTube URL to pass to Y2mate'
        required: true
        type: string

jobs:
  download_video:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Codebase Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright Base Dependencies
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Download and Install Brave
        run: |
          sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave.com
          echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave.com stable main" | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
          sudo apt-get update
          sudo apt-get install brave-browser -y



      - name: Execute Web Automation Interface via Brave
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        uses: actions/github-script@v7
        with:
          script: |
            const { chromium } = require('playwright');
            const fs = require('fs');
            const path = require('path');

            const videoUrl = process.env.VIDEO_URL;
            console.log(`🚀 Launching Brave Browser automation for target: ${videoUrl}`);

            // Direct Playwright core to launch via Brave installation path binary
            const browser = await chromium.launch({ 
              executablePath: '/usr/bin/brave-browser',
              headless: true 
            });
            
            const browserContext = await browser.newContext({
              acceptDownloads: true,
              viewport: { width: 1280, height: 800 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await browserContext.newPage();

            const downloadFolder = './downloads';
            if (!fs.existsSync(downloadFolder)){
                fs.mkdirSync(downloadFolder);
            }

            try {
              // Navigate to the target Y2mate domain page
              await page.goto('https://www-y2mate.com', { waitUntil: 'networkidle' });
              
              // Enter link into input field text box container elements
              const inputSelector = 'input[placeholder*="Search or paste link here"], input#txt-url';
              await page.waitForSelector(inputSelector);
              await page.fill(inputSelector, videoUrl);
              console.log("✏️ Link successfully entered into Y2mate input field.");

              // Click the initial processing 'Start' button
              const startButtonSelector = 'button:has-text("Start"), input[value="Start"], #btn-submit';
              await page.click(startButtonSelector);
              console.log("⏳ Processing conversion request on remote server...");

              // STEP 1: CLICK THE "VIDEO" TAB VIA EXPLICIT TEXT LOCATOR CHECK
              const videoTabSelector = 'a:has-text("Video"), li:has-text("Video"), button:has-text("Video")';
              await page.waitForSelector(videoTabSelector, { timeout: 30000 });
              await page.click(videoTabSelector);
              console.log("🗂️ Clicked and switched onto the Video files tab.");

              // 🛠️ FIXING THE TIMEOUT LOGIC:
              // Instead of strict table markers, look for any structural element containing "Download" or green styling
              const conversionDownloadSelector = '.btn-success, button:has-text("Download"), a:has-text("Download")';
              
              console.log("⏳ Waiting for the specific download grid options to render on screen...");
              await page.waitForSelector(conversionDownloadSelector, { state: 'attached', timeout: 30000 });
              console.log("🎯 Quality download links localized successfully!");

              // STEP 2: ARREST FILE STREAMS AND TRAP ROGUE BLANK AD-WINDOWS
              const downloadPromise = page.waitForEvent('download');
              
              browserContext.on('page', async popup => {
                await popup.close().catch(() => {});
              });

              // Click the first quality conversion row target options button layout link
              await page.locator(conversionDownloadSelector).first().click();
              console.log("👆 Target option button triggered. Intercepting confirmation dialog box frame...");

              // STEP 3: CONFIRM THE FINAL Y2MATE API DOWNLOAD MODAL INTERACTION
              const modalDownloadButton = page.locator('div.modal-dialog button:has-text("Download"), #process-result a, .modal-content a, a:has-text("Download")');
              await page.waitForTimeout(4000); // Allow server engine to substitute link strings
              
              if (await modalDownloadButton.count() > 0) {
                 console.log("👆 Confirming download request inside final dynamic modal layout block...");
                 await modalDownloadButton.first().click();
              }

              // Save the binary output payload securely to pipeline container storage space
              const download = await downloadPromise;
              const finalPath = path.join(downloadFolder, download.suggestedFilename() || 'video.mp4');
              await download.saveAs(finalPath);
              console.log(`✅ File successfully transferred down to workflow runner context path at: ${finalPath}`);

            } catch (error) {
              console.error("❌ Automation routing routine caught failure exception:", error);
              
              try {
                await page.screenshot({ path: 'downloads/error-layout-screenshot.png', fullPage: true });
                console.log("📸 Saved failure visual screenshot layout state to artifact logs.");
              } catch (screenshotError) {
                console.error("⚠️ Failed to capture error state screenshot:", screenshotError);
              }
              
              core.setFailed(error.message);
            } finally {
              await browser.close();
            }

      - name: Export Extracted Media File as Pipeline Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: y2mate-brave-downloaded-video
          path: ./downloads/
          retention-days: 5

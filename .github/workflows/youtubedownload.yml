name: YouTube Video Downloader Automation (Y2mate Async Agent)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Paste the YouTube URL to download'
        required: true
        type: string

jobs:
  download_video:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Codebase Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime (Playwright Core Support)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies & Playwright Core
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Download and Unpack uBlock Origin Lite Engine
        run: |
          mkdir -p ./ublock-ext
          curl -L -o ublock.zip "https://google.com"
          unzip -o ublock.zip -d ./ublock-ext || true
          echo "📦 Extension successfully loaded and extracted into directory structure."

      - name: Execute Async Python Web Automation Script
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        shell: python
        run: |
          import os
          import sys
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              video_url = os.environ.get("VIDEO_URL")
              print(f"🚀 Launching Async Python Browser Agent for Y2mate: {video_url}")

              download_folder = os.path.abspath("./downloads")
              os.makedirs(download_folder, exist_ok=True)
              extension_path = os.path.abspath("./ublock-ext")

              async with async_playwright() as p:
                  # Initialize a persistent context to support extensions and bypass bot filters
                  browser_context = await p.chromium.launch_persistent_context(
                      user_data_dir="",
                      headless=False,
                      args=[
                          "--headless=new", 
                          f"--disable-extensions-except={extension_path}",
                          f"--load-extension={extension_path}",
                          "--no-sandbox",
                          "--disable-setuid-sandbox"
                      ],
                      accept_downloads=True,
                      viewport={"width": 1280, "height": 800}
                  )

                  # 🛠️ FIXED: Pull the first single item [0] out of the pages list instead of assigning the list object
                  pages = browser_context.pages
                  page = pages[0] if pages else await browser_context.new_page()

                  try:
                      # Navigate directly to the provided target Y2mate endpoint URL
                      await page.goto("https://www-y2mate.com", wait_until="domcontentloaded")
                      print("📍 Arrived at Y2mate converter page infrastructure.")

                      # EXACT MATCH INPUT FIELD SELECTOR FROM YOUR PROVIDED HTML:
                      input_selector = "input.y2mate_query.keyword"
                      await page.wait_for_selector(input_selector, state="visible", timeout=30000)
                      
                      input_field = page.locator(input_selector).first
                      await input_field.click()
                      await input_field.fill("")
                      await input_field.fill(video_url)
                      print("✅ Link successfully filled into targeted HTML input element.")

                      # EXACT MATCH SUBMIT BUTTON SELECTOR FROM YOUR PROVIDED HTML:
                      submit_selector = "button#submit.convert-btn"
                      await page.click(submit_selector)
                      print("⏳ Processing conversion request on remote server...")

                      # FORCE THE "VIDEO" TAB LINK TO ENSURE MAXIMUM RESOLUTION ROWS POPULATE
                      video_tab_selector = 'a:has-text("Video"), li:has-text("Video"), button:has-text("Video")'
                      try:
                          await page.wait_for_selector(video_tab_selector, timeout=15000)
                          await page.click(video_tab_selector)
                          print("🗂️ Video options view tab loaded explicitly.")
                      except Exception:
                          print("ℹ️ Video options tab was pre-loaded or not found, looking for grid rows...")

                      # TARGET FIRST BUTTON FROM YOUR EXACT CODE MATCH:
                      first_download_selector = "button.y2link-download"
                      await page.wait_for_selector(first_download_selector, state="attached", timeout=45000)
                      print("🎯 Quality conversion row layout found successfully!")

                      # Global anti-redirect popup filter tracker: instantly drops rogue empty windows
                      async def handle_popup(popup_page):
                          try:
                              await popup_page.close()
                              print("🛡️ Suppressed ad network popup window container layout.")
                          except Exception:
                              pass
                      browser_context.on("page", handle_popup)

                      # Click the first highest-quality generation button element node
                      print("👆 First button row layout activated. Compiling asset download streams...")
                      await page.locator(first_download_selector).first.click(force=True)

                      # TARGET SECOND BUTTON FROM YOUR EXACT CODE MATCH:
                      second_download_selector = "a.btn-download-link"
                      
                      print("⏳ Waiting for backend generation to append the final Download anchor tag...")
                      final_download_link = page.locator(second_download_selector).first
                      
                      # Wait up to 45 seconds for the loading wheel svg spinner to swap out for the link node
                      await final_download_link.wait_for(state="visible", timeout=45000)
                      print("🎯 Compilation completed! The final 'Download' button is visible.")

                      # TRIGGER AND SAVE CORRESPONDING ENGINES DOWNLOADING PROCESS
                      print("📥 Requesting asset stream download pipeline mapping...")
                      async with page.expect_download(timeout=60000) as download_info:
                          await final_download_link.click(force=True)
                      
                      download = await download_info.value
                      final_path = os.path.join(download_folder, download.suggestedFilename or "video.mp4")
                      
                      # Save data payload stream securely down to disk path mapping routes
                      await download.save_as(final_path)
                      print(f"✅ File successfully transferred down to path at: ${final_path}")

                  except Exception as error:
                      print(f"❌ Automation routing routine caught failure exception: {error}", file=sys.stderr)
                      try:
                          await page.screenshot(path="./downloads/error-layout-screenshot.png", full_page=True)
                          print("📸 Saved failure visual screenshot layout state to artifact logs.")
                      except Exception as e:
                          print(f"⚠️ Failed to capture error screenshot: {e}")
                      sys.exit(1)
                  finally:
                      await browser_context.close()

          # Boot up the Python Asyncio event loop manager to parse the code block
          asyncio.run(main())

      - name: Export Extracted Media File as Pipeline Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: y2mate-async-downloaded-video
          path: ./downloads/
          retention-days: 5

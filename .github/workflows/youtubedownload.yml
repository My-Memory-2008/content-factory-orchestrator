name: YouTube Video Downloader Automation (via Publer Text Lookup)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Paste the YouTube URL to pass to Publer'
        required: true
        type: string

jobs:
  download_video:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Codebase Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright and System Dependencies
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Execute Web Automation Interface
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        uses: actions/github-script@v7
        with:
          script: |
            const { chromium } = require('playwright');
            const fs = require('fs');

            const videoUrl = process.env.VIDEO_URL;
            console.log(`🚀 Processing automation targeting Publer engine for: ${videoUrl}`);

            const browser = await chromium.launch({ headless: true });
            
            const browserContext = await browser.newContext({
              acceptDownloads: true,
              viewport: { width: 1440, height: 900 }, // Forced widespread desktop window matrix to trigger responsive visibility rules
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await browserContext.newPage();

            const downloadFolder = './downloads';
            if (!fs.existsSync(downloadFolder)){
                fs.mkdirSync(downloadFolder);
            }

            try {
              // Navigate to Publer's tool asset page
              await page.goto('https://publer.com/tools/photo-video-downloader', { waitUntil: 'networkidle' });
              
              // Enter the target link
              const inputSelector = 'input[placeholder*="Paste the URL"], input[type="text"]';
              await page.waitForSelector(inputSelector);
              await page.fill(inputSelector, videoUrl);
              console.log("✏️ Link successfully entered into Publer framework container.");

              // Click the initial processing 'Download' execution button
              const buttonSelector = 'button:has-text("Download")';
              await page.click(buttonSelector);
              console.log("⏳ Processing conversion request on remote server...");

              // 🛠️ BYPASS RESPONSIVE HIDDEN ELEMENT VISIBILITY RULES:
              // Locate the text block even if Publer's system applies a "hidden" CSS rule to the viewport
              const internalTextSelector = 'text="to your device"';
              
              console.log("⏳ Explicitly tracking the phrase element 'to your device'...");
              await page.waitForSelector(internalTextSelector, { state: 'attached', timeout: 60000 });
              console.log("🎯 Anchor text token located inside page object map.");

              // Initialize a promise block to trap the brand new page tab context opened by the click event
              const newPagePromise = browserContext.waitForEvent('page');
              
              console.log("🖱️ Triggering programmatic direct dispatch click on parent download anchor element...");
              // We dispatch a direct DOM click event to ensure hidden layout layers do not block the pointer interaction
              await page.dispatchEvent(internalTextSelector, 'click');
              
              // Resolve the promise to control the new page object instance
              const redirectedPage = await newPagePromise;
              await redirectedPage.waitForLoadState('networkidle');
              
              console.log(`✅ Redirect complete! Current new page URL position: ${redirectedPage.url()}`);

            } catch (error) {
              console.error("❌ Automation routing routine caught failure exception:", error);
              
              try {
                await page.screenshot({ path: 'downloads/error-layout-screenshot.png', fullPage: true });
                console.log("📸 Saved failure visual screenshot layout state to artifact logs.");
              } catch (screenshotError) {
                console.error("⚠️ Failed to capture error state screenshot:", screenshotError);
              }
              
              core.setFailed(error.message);
            } finally {
              await browser.close();
            }

      - name: Export Workflow Execution Output Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: publer-automation-logs
          path: ./downloads/
          retention-days: 5

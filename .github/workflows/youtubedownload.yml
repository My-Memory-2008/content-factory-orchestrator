name: Publer Video Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Paste the Social Media Video URL'
        required: true
        type: string

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Ensure Playwright Browsers are Installed
        run: |
          python -m playwright install chromium --with-deps

      - name: Run Downloader Script
        id: downloader
        env:
          TARGET_URL: ${{ github.event.inputs.video_url }}
        run: |
          cat << 'EOF' > download_script.py
          import os
          import sys
          import time
          from playwright.sync_api import sync_playwright

          def run():
              target_url = os.environ.get("TARGET_URL")
              if not target_url:
                  print("Error: TARGET_URL environment variable is missing.")
                  sys.exit(1)

              print(f"Initializing browser to download: {target_url}")
              
              with sync_playwright() as p:
                  # Launching headless with a normal user agent to avoid basic bot blocks
                  browser = p.chromium.launch(headless=True)
                  context = browser.new_context(
                      user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                  )
                  page = context.new_page()

                  # Navigate to the Publer tools page
                  print("Navigating to Publer Downloader...")
                  page.goto("https://publer.com/tools/photo-video-downloader", wait_until="networkidle")

                  # Locate input box and paste the link
                  print("Entering video URL...")
                  input_selector = "input[placeholder*='Paste'], input[type='url'], #url"
                  page.wait_for_selector(input_selector)
                  page.fill(input_selector, target_url)

                  # Click the 'Download' / Submit button
                  print("Clicking the Download button to fetch details...")
                  button_selector = "button:has-text('Download'), button[type='submit']"
                  page.click(button_selector)

                  # Wait for processing and target the actual generated asset download button
                  print("Waiting for Publer to process the link...")
                  
                  # Set up the event listener for the actual file streaming event
                  with page.expect_download(timeout=60000) as download_info:
                      # Click the final dynamic link or download action that pops up after rendering
                      final_download_btn = "a:has-text('Download'), button:has-text('Download Video'), .download-link"
                      page.wait_for_selector(final_download_btn)
                      page.click(final_download_btn)
                  
                  download = download_info.value
                  filename = download.suggested_filename or "downloaded_video.mp4"
                  output_path = os.path.join(os.getcwd(), filename)
                  
                  # Save file locally into the working directory
                  download.save_as(output_path)
                  print(f"Success! Video safely saved to: {output_path}")
                  
                  browser.close()

          if __name__ == "__main__":
              run()
          EOF
          
          python download_script.py

      - name: Upload Video as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Publer-Downloaded-Video
          path: |
            *.mp4
            *.mov
            *.mkv
          if-no-files-found: error


name: Instagram Video Downloader Automation (Downreels Engine)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Paste the Instagram Reel/Video URL to download'
        required: true
        type: string
        

jobs:
  download_video:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Codebase Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright and Dependencies
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Create Downloads Folder Structure
        run: mkdir -p ./instagramdownloads

      - name: Execute Web Automation Interface
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        uses: actions/github-script@v7
        with:
          script: |
            const { chromium } = require('playwright');
            const fs = require('fs');
            const path = require('path');

            const videoUrl = process.env.VIDEO_URL;
            console.log(`🚀 Launching Chrome Engine for Downreels: ${videoUrl}`);

            const downloadFolder = './instagramdownloads';
            if (!fs.existsSync(downloadFolder)){
                fs.mkdirSync(downloadFolder);
            }

            // Launch a persistent browser context to cleanly intercept streams and isolate ads
            const browserContext = await chromium.launchPersistentContext('', {
              headless: false, 
              args: [
                `--headless=new`, 
                `--no-sandbox`,
                `--disable-setuid-sandbox`
              ],
              acceptDownloads: true,
              viewport: { width: 1280, height: 800 }
            });

            const pages = browserContext.pages();
            const page = pages.length > 0 ? pages[0] : await browserContext.newPage();

            // Intercept and close popups instantly to avoid blocking elements or corrupting context focus
            browserContext.on('page', async popup => {
              try {
                await popup.close();
                console.log("🛡️ Suppressed ad network popup window.");
              } catch (e) {}
            });

            try {
              // 1. Open Downreels platform
              await page.goto('https://downreels.com/', { waitUntil: 'domcontentloaded' });
              
              // 2. Click, fill field with input video URL, and click process button
              const textbox = page.getByRole('textbox', { name: 'Paste Instagram Reel URL' });
              await textbox.waitFor({ state: 'visible', timeout: 30000 });
              await textbox.click();
              await textbox.fill(videoUrl);
              console.log("✏️ Link entered into the processing wrapper.");

              // Click the initial query/submit button
              await page.getByRole('button', { name: 'DOWNLOAD', exact: true }).click();
              console.log("⏳ Running server-side lookup on target reel...");

              // 3. Target the dynamically rendered video asset download container button
              const downloadBtn = page.getByRole('button', { name: 'Download HD MP4' });
              await downloadBtn.waitFor({ state: 'visible', timeout: 45000 });

              // FIX: Listen for download globally on browserContext so popup tabs don't hijack the stream event
              const downloadPromise = browserContext.waitForEvent('download');
              await downloadBtn.click();
              
              const download = await downloadPromise;

              // 4. Extract stream payload data and write out the valid final file bytes
              const finalPath = path.join(downloadFolder, download.suggestedFilename() || 'instagram_video.mp4');
              await download.saveAs(finalPath);
              console.log(`✅ Instagram media asset saved to runner file pipeline: ${finalPath}`);

            } catch (error) {
              console.error("❌ Automation routine caught failure exception:", error);
              try {
                await page.screenshot({ path: './instagramdownloads/error-layout-screenshot.png', fullPage: true });
                console.log("📸 Saved failure screenshot to your workspace logs.");
              } catch (e) {}
              core.setFailed(error.message);
            } finally {
              await browserContext.close();
            }

      - name: Export Extracted Media File as Pipeline Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instagram-downloaded-video
          path: ./instagramdownloads/
          retention-days: 5
